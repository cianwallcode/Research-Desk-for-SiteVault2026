<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiteVault | Research Desk</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --white: #ffffff;
            --border: #dcdde1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #2f3640;
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar Navigation */
        #sidebar {
            width: 300px;
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #95a5a6;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #34495e;
            border: 1px solid #576574;
            color: white;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* Main Content Area */
        #main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .report-paper {
            background: var(--white);
            max-width: 850px;
            margin: 0 auto;
            min-height: 1000px;
            padding: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 2px;
            position: relative;
        }

        /* Report Styling */
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1, h2, h3 { margin: 0; color: var(--primary); }
        
        .statutory-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .portal-btn {
            display: block;
            padding: 15px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            border-radius: 4px;
            transition: opacity 0.2s;
        }

        .land-btn { background: #005596; color: white; }
        .flood-btn { background: #007a3d; color: white; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        td {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .label-cell { color: #888; width: 30%; }

        .notes-box {
            background: #f9f9f9;
            padding: 25px;
            border-left: 4px solid var(--accent);
            font-style: italic;
            line-height: 1.6;
            margin-top: 20px;
        }

        .gen-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            width: 100%;
            font-weight: bold;
            font-size: 14px;
            margin-top: 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media print {
            #sidebar { display: none; }
            #main-content { padding: 0; }
            .report-paper { box-shadow: none; border: none; }
            .gen-btn { display: none; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="logo">SITEVAULT.RD</div>
        <label>Select Precedent Site</label>
        <select id="site-select" onchange="generateReport(this.value)">
            <option value="">-- Select from Inventory --</option>
        </select>
        
        <div style="margin-top: auto; font-size: 11px; color: #7f8c8d;">
            RESEARCH DESK v1.0<br>
            Geospatial Infrastructure 2026
        </div>
    </div>

    <div id="main-content">
        <div class="report-paper" id="report-output">
            <div style="text-align: center; padding-top: 150px; color: #bdc3c7;">
                <h3>RESEARCH DESK ACTIVE</h3>
                <p>Select a site from the inventory to compile statutory data.</p>
            </div>
        </div>
    </div>

    <script>
        // Use your full 100-site churchData array here
        const churchData = [
            { id: 1, name: "St. Kevin's Kitchen", coords: [53.0101, -6.3298], bucket: "Cistercian", sign: "Intact stone roof; study for thermal mass and vaulted geometry." },
            { id: 24, name: "St. Michael's Creeslough", coords: [55.1201, -7.9054], bucket: "Modernist", sign: "Fan-plan with mountain-peak roofline. Site-responsive icon by Liam McCormick." },
            // ... (Paste your other 98 sites here)
        ];

        function init() {
            const select = document.getElementById('site-select');
            churchData.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.name;
                select.appendChild(opt);
            });
        }

        function generateReport(id) {
            if (!id) return;
            const s = churchData.find(x => x.id == id);
            const output = document.getElementById('report-output');

            output.innerHTML = `
                <div class="report-header">
                    <div>
                        <h1>${s.name}</h1>
                        <p style="color:var(--accent); font-weight:bold; margin-top:5px;">RESEARCH DESK REPORT</p>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:bold; font-size:12px;">ID: #SITE-${s.id}</div>
                        <div style="color:#888; font-size:11px;">DATE: ${new Date().toLocaleDateString()}</div>
                    </div>
                </div>

                <h3 style="font-size:14px; text-transform:uppercase; letter-spacing:1px; margin-bottom:15px;">I. Statutory Search Portals</h3>
                <p style="font-size:13px;">Cross-reference coordinates <b>[${s.coords[0]}, ${s.coords[1]}]</b> against national registries:</p>
                
                <div class="statutory-grid">
                    <a href="https://www.landdirect.ie/" target="_blank" class="portal-btn land-btn">OPEN LANDDIRECT.IE (TITLE)</a>
                    <a href="https://www.floodinfo.ie/map/floodmaps/" target="_blank" class="portal-btn flood-btn">OPEN FLOODMAPS.IE (RISK)</a>
                </div>

                <h3 style="font-size:14px; text-transform:uppercase; letter-spacing:1px; margin-top:40px;">II. Geographic Data</h3>
                <table>
                    <tr><td class="label-cell">Typology</td><td>${s.bucket} Structure</td></tr>
                    <tr><td class="label-cell">Latitude</td><td style="font-family:monospace;">${s.coords[0]}</td></tr>
                    <tr><td class="label-cell">Longitude</td><td style="font-family:monospace;">${s.coords[1]}</td></tr>
                    <tr><td class="label-cell">Inventory Status</td><td>Verified Surviving</td></tr>
                </table>

                <h3 style="font-size:14px; text-transform:uppercase; letter-spacing:1px; margin-top:40px;">III. Desk Research Notes</h3>
                <div class="notes-box">
                    "${s.sign}"
                </div>

                <button class="gen-btn" onclick="window.print()">Generate Report (PDF)</button>

                <div style="margin-top:60px; border-top:1px solid #eee; padding-top:20px; font-size:10px; color:#bdc3c7; text-align:center;">
                    CONFIDENTIAL RESEARCH DOCUMENT • SITEVAULT GEOSPATIAL SYSTEMS
                </div>
            `;
        }

        window.onload = init;
    </script>
</body>
</html>
